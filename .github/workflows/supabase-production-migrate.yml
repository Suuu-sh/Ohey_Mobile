name: Supabase Production Migrate

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-production-migrate.yml'
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-production-migrate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-production-db:
    name: Validate and apply Supabase migrations
    uses: Suuu-sh/Shared/.github/workflows/supabase-postgres-migrate.yml@main
    with:
      migrations-dir: supabase/migrations
      deploy-ref: refs/heads/main
    secrets:
      database_url: ${{ secrets.SUPABASE_PRODUCTION_DATABASE_URL }}
