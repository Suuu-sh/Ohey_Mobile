name: Supabase Dev Migrate

on:
  push:
    branches:
      - development
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-dev-migrate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-dev-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-dev-db:
    name: Validate and apply dev Supabase migrations
    uses: Suuu-sh/Shared/.github/workflows/supabase-postgres-migrate.yml@main
    with:
      migrations-dir: supabase/migrations
      deploy-ref: refs/heads/development
    secrets:
      database_url: ${{ secrets.SUPABASE_DEV_DATABASE_URL }}
