name: TestFlight Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'assets/**'
      - 'ios/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/testflight-deploy.yml'
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional iOS build number override. Leave blank to use the Shared action timestamp.
        required: false
        type: string
      force_google_test_ads:
        description: Use Google sample ad units for this TestFlight build. Do not use for App Review.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: testflight-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 90
    environment: testflight

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate Ohey production environment
        env:
          DOTENV_PRODUCTION: ${{ secrets.DOTENV_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${DOTENV_PRODUCTION:-}" ]; then
            echo "::error::DOTENV_PRODUCTION secret is required for TestFlight builds."
            exit 1
          fi

      - name: Prepare production dart defines
        env:
          DOTENV_PRODUCTION: ${{ secrets.DOTENV_PRODUCTION }}
          OHEY_REVENUECAT_IOS_API_KEY: ${{ secrets.OHEY_REVENUECAT_IOS_API_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          GOOGLE_IOS_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_IOS_REVERSED_CLIENT_ID }}
          FORCE_GOOGLE_TEST_ADS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_google_test_ads || 'false' }}
        run: |
          set -euo pipefail
          printf '%s\n' "$DOTENV_PRODUCTION" > .env.production
          {
            echo "OHEY_REVENUECAT_ENTITLEMENT_ID=plus"
            echo "OHEY_REVENUECAT_OFFERING_ID=default"
            echo "OHEY_REVENUECAT_PRODUCT_ID=ohey_plus_monthly"
            echo "OHEY_BACKEND_URL=https://api.oheyapp.com"
            echo "OHEY_ENABLE_APPLE_OAUTH=true"
            if [ -n "${OHEY_REVENUECAT_IOS_API_KEY:-}" ]; then
              echo "OHEY_REVENUECAT_IOS_API_KEY=$OHEY_REVENUECAT_IOS_API_KEY"
            fi
            if [ -n "${CLERK_PUBLISHABLE_KEY:-}" ]; then
              echo "CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY"
            fi
            if [ -n "${GOOGLE_WEB_CLIENT_ID:-}" ]; then
              echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID"
            fi
            if [ -n "${GOOGLE_IOS_CLIENT_ID:-}" ]; then
              echo "GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID"
            fi
            if [ -n "${GOOGLE_IOS_REVERSED_CLIENT_ID:-}" ]; then
              echo "GOOGLE_IOS_REVERSED_CLIENT_ID=$GOOGLE_IOS_REVERSED_CLIENT_ID"
            fi
            if [ "${FORCE_GOOGLE_TEST_ADS:-false}" = "true" ]; then
              echo "OHEY_ADMOB_FORCE_TEST_ADS=true"
            fi
          } >> .env.production

          dart_define_args=()
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              ''|'#'*) continue ;;
            esac
            key="${line%%=*}"
            value="${line#*=}"
            if [ -z "$key" ] || [ "$key" = "$line" ]; then
              continue
            fi
            dart_define_args+=("--dart-define=$key=$value")
          done < .env.production

          if [ ${#dart_define_args[@]} -eq 0 ]; then
            echo "::error::DOTENV_PRODUCTION did not contain any KEY=value lines."
            exit 1
          fi

          printf '%s\n' "${dart_define_args[@]}" > "$RUNNER_TEMP/ohey_dart_defines.args"

          admob_ios_app_id="$(grep -E '^OHEY_ADMOB_IOS_APP_ID=' .env.production | tail -1 | cut -d= -f2- || true)"
          admob_ios_native_ad_unit_id="$(grep -E '^OHEY_ADMOB_IOS_NATIVE_AD_UNIT_ID=' .env.production | tail -1 | cut -d= -f2- || true)"
          if [ -z "$admob_ios_app_id" ] || [[ "$admob_ios_app_id" == ca-app-pub-3940256099942544~* ]]; then
            echo "::error::OHEY_ADMOB_IOS_APP_ID must be a production AdMob app ID for TestFlight builds."
            exit 1
          fi
          if [ -z "$admob_ios_native_ad_unit_id" ] || [[ "$admob_ios_native_ad_unit_id" == ca-app-pub-3940256099942544/* ]]; then
            echo "::error::OHEY_ADMOB_IOS_NATIVE_AD_UNIT_ID must be a production AdMob native ad unit ID for TestFlight builds."
            exit 1
          fi
          clerk_publishable_key="$(grep -E '^CLERK_PUBLISHABLE_KEY=' .env.production | tail -1 | cut -d= -f2- || true)"
          if [ -z "$clerk_publishable_key" ]; then
            echo "::error::CLERK_PUBLISHABLE_KEY must be set for TestFlight builds."
            exit 1
          fi
          if [[ "$clerk_publishable_key" != pk_live_* && "$clerk_publishable_key" != pk_test_* ]]; then
            echo "::error::CLERK_PUBLISHABLE_KEY must be a Clerk publishable key."
            exit 1
          fi
          google_web_client_id="$(grep -E '^GOOGLE_WEB_CLIENT_ID=' .env.production | tail -1 | cut -d= -f2- || true)"
          google_ios_client_id="$(grep -E '^GOOGLE_IOS_CLIENT_ID=' .env.production | tail -1 | cut -d= -f2- || true)"
          google_ios_reversed_client_id="$(grep -E '^GOOGLE_IOS_REVERSED_CLIENT_ID=' .env.production | tail -1 | cut -d= -f2- || true)"
          if [ -z "$google_web_client_id" ] || [ -z "$google_ios_client_id" ] || [ -z "$google_ios_reversed_client_id" ]; then
            echo "::error::GOOGLE_WEB_CLIENT_ID, GOOGLE_IOS_CLIENT_ID and GOOGLE_IOS_REVERSED_CLIENT_ID are required for native Google Sign-In."
            exit 1
          fi
          echo "GAD_APPLICATION_IDENTIFIER=$admob_ios_app_id" >> "$GITHUB_ENV"
          echo "GOOGLE_IOS_REVERSED_CLIENT_ID=$google_ios_reversed_client_id" >> "$GITHUB_ENV"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Resolve TestFlight build number
        id: build-number
        env:
          INPUT_BUILD_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.build_number || '' }}
        run: |
          set -euo pipefail
          build_number="$INPUT_BUILD_NUMBER"
          if [ -n "$build_number" ] && ! [[ "$build_number" =~ ^[0-9]+$ ]]; then
            echo "::error::Build number must be numeric: $build_number"
            exit 1
          fi
          if [ -z "$build_number" ]; then
            build_number="$(TZ=Asia/Tokyo date +%Y%m%d%H%M%S)"
          fi
          echo "build-number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Generate Flutter iOS release config
        run: |
          set -euo pipefail
          build_number="${{ steps.build-number.outputs.build-number }}"

          args=(--release --config-only --dart-define=OHEY_ENV=production --build-number "$build_number")
          while IFS= read -r define_arg || [ -n "$define_arg" ]; do
            args+=("$define_arg")
          done < "$RUNNER_TEMP/ohey_dart_defines.args"

          flutter build ios "${args[@]}"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve iOS archive paths
        run: |
          set -euo pipefail
          {
            echo "ARCHIVE_PATH=$RUNNER_TEMP/Runner.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/RunnerExport"
            echo "EXPORT_OPTIONS_PLIST=$RUNNER_TEMP/RunnerExportOptions.plist"
            echo "KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db"
          } >> "$GITHUB_ENV"

      - name: Create App Store Connect API key file
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "APP_STORE_CONNECT_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Install distribution certificate
        env:
          IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/ios_distribution_certificate.p12"
          keychain_password="$(openssl rand -base64 24)"

          printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64" | base64 -D > "$cert_path"

          security create-keychain -p "$keychain_password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$keychain_password" "$KEYCHAIN_PATH"
          security import "$cert_path" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$KEYCHAIN_PATH"

          existing_keychains=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $existing_keychains
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Download App Store provisioning profiles
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require 'base64'
          require 'json'
          require 'net/http'
          require 'openssl'
          require 'uri'

          key_id = ENV.fetch('ASC_KEY_ID')
          issuer_id = ENV.fetch('ASC_ISSUER_ID')
          private_key = OpenSSL::PKey.read(File.read(ENV.fetch('APP_STORE_CONNECT_KEY_PATH')))

          def b64url(data)
            Base64.urlsafe_encode64(data).delete('=')
          end

          def der_to_jose(der_sig, size)
            asn1 = OpenSSL::ASN1.decode(der_sig)
            asn1.value.map(&:value).map { |i| i.to_s(2).rjust(size, "\x00") }.join
          end

          def token_for(key_id, issuer_id, private_key)
            now = Time.now.to_i
            header = { alg: 'ES256', kid: key_id, typ: 'JWT' }
            payload = { iss: issuer_id, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' }
            signing_input = [b64url(header.to_json), b64url(payload.to_json)].join('.')
            der_sig = private_key.sign('SHA256', signing_input)
            [signing_input, b64url(der_to_jose(der_sig, 32))].join('.')
          end

          TOKEN = token_for(key_id, issuer_id, private_key)

          def asc_request(method, path, params: {}, body: nil, fail_on_error: true)
            uri = URI("https://api.appstoreconnect.apple.com#{path}")
            uri.query = URI.encode_www_form(params) unless params.empty?
            request = method.new(uri)
            request['Authorization'] = "Bearer #{TOKEN}"
            request['Content-Type'] = 'application/json'
            request.body = JSON.generate(body) if body
            response = Net::HTTP.start(uri.host, uri.port, use_ssl: true) { |http| http.request(request) }
            parsed = response.body.nil? || response.body.empty? ? {} : JSON.parse(response.body)
            if fail_on_error && !response.is_a?(Net::HTTPSuccess)
              warn JSON.pretty_generate(parsed)
              exit 1
            end
            [response, parsed]
          end

          def get_json(path, params = {})
            asc_request(Net::HTTP::Get, path, params: params).last
          end

          def post_json(path, body)
            asc_request(Net::HTTP::Post, path, body: body).last
          end

          def try_post_json(path, body)
            asc_request(Net::HTTP::Post, path, body: body, fail_on_error: false)
          end

          def first_data!(response, label)
            item = response.fetch('data').first
            abort("#{label} not found") unless item
            item
          end

          app_bundle = first_data!(get_json('/v1/bundleIds', {
            'filter[identifier]' => 'app.ohey.com',
            'limit' => '1',
          }), 'App bundle ID app.ohey.com')
          app_bundle_id = app_bundle.fetch('id')

          capability_body = {
            data: {
              type: 'bundleIdCapabilities',
              attributes: {
                capabilityType: 'SIGN_IN_WITH_APPLE',
                settings: [],
              },
              relationships: {
                bundleId: {
                  data: {
                    type: 'bundleIds',
                    id: app_bundle_id,
                  },
                },
              },
            },
          }
          capability_response, capability_result = try_post_json('/v1/bundleIdCapabilities', capability_body)
          if capability_response.is_a?(Net::HTTPSuccess)
            puts 'Enabled Sign in with Apple for app.ohey.com'
          else
            capability_error = capability_result.fetch('errors', []).first || {}
            capability_detail = capability_error.fetch('detail', '')
            capability_code = capability_error.fetch('code', '')
            unless capability_response.code == '409' || capability_code.include?('DUPLICATE') || capability_detail.match?(/already|existing/i)
              warn JSON.pretty_generate(capability_result)
              exit 1
            end
            puts 'Sign in with Apple capability is already enabled for app.ohey.com'
          end

          distribution_certificates = get_json('/v1/certificates', {
            'filter[certificateType]' => 'IOS_DISTRIBUTION',
            'limit' => '200',
          }).fetch('data')
          abort('No active iOS distribution certificates found') if distribution_certificates.empty?

          generated_app_profile_name = "Ohey App Store CI SignInWithApple #{Time.now.utc.strftime('%Y%m%d%H%M%S')}"
          created_app_profile = post_json('/v1/profiles', {
            data: {
              type: 'profiles',
              attributes: {
                name: generated_app_profile_name,
                profileType: 'IOS_APP_STORE',
              },
              relationships: {
                bundleId: {
                  data: {
                    type: 'bundleIds',
                    id: app_bundle_id,
                  },
                },
                certificates: {
                  data: distribution_certificates.map { |certificate| { type: 'certificates', id: certificate.fetch('id') } },
                },
              },
            },
          }).fetch('data')

          profiles = {
            'APP_PROVISIONING_PROFILE_NAME' => generated_app_profile_name,
            'WIDGET_PROVISIONING_PROFILE_NAME' => 'Ohey Widgets App Store CI 20260529095238',
          }

          profile_dir = File.expand_path('~/Library/MobileDevice/Provisioning Profiles')
          Dir.mkdir(File.expand_path('~/Library/MobileDevice')) unless Dir.exist?(File.expand_path('~/Library/MobileDevice'))
          Dir.mkdir(profile_dir) unless Dir.exist?(profile_dir)

          File.open(ENV.fetch('GITHUB_ENV'), 'a') do |env|
            profiles.each do |env_name, profile_name|
              response = get_json('/v1/profiles', {
                'filter[name]' => profile_name,
                'filter[profileState]' => 'ACTIVE',
                'limit' => '10',
              })
              profile = response.fetch('data').find { |item| item.dig('attributes', 'name') == profile_name }
              abort("Provisioning profile not found: #{profile_name}") unless profile

              attrs = profile.fetch('attributes')
              uuid = attrs.fetch('uuid')
              content = Base64.decode64(attrs.fetch('profileContent'))
              File.binwrite(File.join(profile_dir, "#{uuid}.mobileprovision"), content)
              env.puts "#{env_name}=#{profile_name}"
              puts "Installed #{profile_name} (#{uuid})"
            end
          end
          RUBY

      - name: Generate manual signing export options
        run: |
          set -euo pipefail
          cat > "$EXPORT_OPTIONS_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.ohey.com</key>
              <string>$APP_PROVISIONING_PROFILE_NAME</string>
              <key>app.ohey.com.widgets</key>
              <string>$WIDGET_PROVISIONING_PROFILE_NAME</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>83J5SB3ZPX</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          plutil -p "$EXPORT_OPTIONS_PLIST"

      - name: Configure manual signing for archive
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          pbxproj = Path('ios/Runner.xcodeproj/project.pbxproj')
          text = pbxproj.read_text(encoding='utf-8')
          profiles = {
              'app.ohey.com': os.environ['APP_PROVISIONING_PROFILE_NAME'],
              'app.ohey.com.widgets': os.environ['WIDGET_PROVISIONING_PROFILE_NAME'],
          }

          def set_setting(block: str, key: str, value: str) -> str:
              line = f"\t\t\t\t{key} = {value};"
              pattern = re.compile(rf"^\t{{4}}{re.escape(key)} = .*;$", re.MULTILINE)
              if pattern.search(block):
                  return pattern.sub(line, block)
              return block + line + "\n"

          pattern = re.compile(
              r"(?P<header>\t\t[0-9A-F]+ /\* [^*]+ \*/ = \{\n"
              r"\t\t\tisa = XCBuildConfiguration;\n"
              r"(?:\t\t\t(?!buildSettings = \{)[^\n]*\n)*"
              r"\t\t\tbuildSettings = \{\n)"
              r"(?P<body>.*?)"
              r"(?P<footer>\t\t\t\};\n\t\t\tname = [^;]+;\n\t\t\};)",
              re.DOTALL,
          )

          changed = {bundle_id: 0 for bundle_id in profiles}

          def replace(match: re.Match) -> str:
              body = match.group('body')
              for bundle_id, profile_name in profiles.items():
                  if f"PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};" not in body:
                      continue
                  original = body
                  body = set_setting(body, 'CODE_SIGN_STYLE', 'Manual')
                  body = set_setting(body, 'CODE_SIGN_IDENTITY', '"Apple Distribution"')
                  body = set_setting(body, 'DEVELOPMENT_TEAM', '83J5SB3ZPX')
                  body = set_setting(body, 'PROVISIONING_PROFILE_SPECIFIER', f'"{profile_name}"')
                  if body != original:
                      changed[bundle_id] += 1
                  return match.group('header') + body + match.group('footer')
              return match.group(0)

          text = pattern.sub(replace, text)
          missing = [bundle_id for bundle_id, count in changed.items() if count == 0]
          if missing:
              raise SystemExit(f"No build settings block found for: {', '.join(missing)}")
          pbxproj.write_text(text, encoding='utf-8')
          print('Configured manual signing:', changed)
          PY

      - name: Normalize CI release entitlements
        run: |
          set -euo pipefail
          python3 <<'PY'
          import plistlib
          from pathlib import Path

          # The App Store provisioning profiles used by CI intentionally do not
          # include the App Group capability. Keep Release entitlements aligned
          # with those profiles so TestFlight archives do not fail signing.
          release_entitlements = [
              Path('ios/Runner/RunnerRelease.entitlements'),
              Path('ios/OheyWidgets/OheyWidgetsRelease.entitlements'),
          ]
          for path in release_entitlements:
              data = {}
              if path.exists():
                  with path.open('rb') as handle:
                      data = plistlib.load(handle)
              data.pop('com.apple.security.application-groups', None)
              if path.name == 'RunnerRelease.entitlements':
                  data['aps-environment'] = 'production'
              with path.open('wb') as handle:
                  plistlib.dump(data, handle)
              print(f'Normalized {path}')
          PY
          plutil -p ios/Runner/RunnerRelease.entitlements
          plutil -p ios/OheyWidgets/OheyWidgetsRelease.entitlements

      - name: Archive release build
        run: |
          set -euo pipefail
          rm -rf "$ARCHIVE_PATH" "$EXPORT_PATH"
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM=83J5SB3ZPX \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CURRENT_PROJECT_VERSION="${{ steps.build-number.outputs.build-number }}" \
            GAD_APPLICATION_IDENTIFIER="$GAD_APPLICATION_IDENTIFIER" \
            GOOGLE_IOS_REVERSED_CLIENT_ID="$GOOGLE_IOS_REVERSED_CLIENT_ID" \
            archive

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -authenticationKeyPath "$APP_STORE_CONNECT_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Assign TestFlight build to internal testers
        uses: Suuu-sh/Shared/actions/testflight-distribute-existing-build@main
        with:
          app-bundle-id: app.ohey.com
          app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          app-store-connect-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          build-number: ${{ steps.build-number.outputs.build-number }}
          testflight-internal-group-name: ${{ vars.TESTFLIGHT_INTERNAL_GROUP_NAME }}
          testflight-internal-tester-emails: ${{ secrets.TESTFLIGHT_INTERNAL_TESTER_EMAILS }}
          testflight-notify-assigned-testers: 'true'

      - name: Upload export artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-deploy-logs
          path: |
            ${{ env.EXPORT_PATH }}
            ${{ env.ARCHIVE_PATH }}
          if-no-files-found: ignore

      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          if [ -n "${PROVISIONING_PROFILE_UUID:-}" ]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROVISIONING_PROFILE_UUID.mobileprovision" || true
          fi
